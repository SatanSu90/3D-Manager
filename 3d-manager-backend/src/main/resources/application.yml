server:
  port: 8080

spring:
  application:
    name: 3d-manager-backend

  datasource:
    url: jdbc:mysql://localhost:3306/manager3d?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&connectionCollation=utf8mb4_unicode_ci
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MinIO
minio:
  endpoint: http://localhost:9000
  access-key: admin
  secret-key: admin
  bucket-models: 3d-models
  bucket-thumbnails: 3d-thumbnails

# JWT
jwt:
  secret: 3dManagerSecretKeyForJWTTokenGenerationMustBeLongEnoughForHS256Algorithm2026
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

logging:
  level:
    com.manager3d: DEBUG
    org.hibernate.SQL: WARN
